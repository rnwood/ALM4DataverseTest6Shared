parameters:
  - name: environmentName
    type: string
  - name: useAlm4DataverseExtension
    type: boolean
    default: true
  - name: timeoutInMinutes
    type: number
    default: 360  # maximum allowed on Microsoft-hosted agents (free and paid)

stages:
  - stage: Deploy_${{ replace(replace(replace(replace(replace(replace(parameters.environmentName, ' ', '_'), '-', '_'), '.', '_'), '(', '_'), ')', '_'), '/', '_') }}
    displayName: 'Deploy to ${{ parameters.environmentName }}'
    
    jobs:
      - deployment: Deploy
        pool: 
          vmImage: windows-2022
        displayName: 'Deploy'
        environment: ${{ parameters.environmentName }}
        timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
        
        variables:
          # Convention-based variable group: Environment-{EnvironmentName}
          - group: 'Environment-${{ parameters.environmentName }}'
        
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  persistCredentials: true
                  fetchDepth: 1
                  displayName: 'Checkout Source Repository'

                - task: PowerPlatformToolInstaller@2
                  displayName: 'Install Power Platform Tools'
                  inputs:
                    AddToolsToPath: false
                
                - ${{ if eq(parameters.useAlm4DataverseExtension, true) }}:
                  - task: ALM4Dataverse.alm4dataverse-azdo-extensions.alm4dataverse-set-connection-variables.ALM4DataverseSetConnectionVariables@1
                    displayName: 'Set Connection Variables'
                    name: ALM4DataverseSetConnectionVariables
                    inputs:
                      authenticationType: 'PowerPlatformSPN'
                      PowerPlatformSPN: '${{ parameters.environmentName }}'

                - ${{ if ne(parameters.useAlm4DataverseExtension, true) }}:
                  - task: microsoft-IsvExpTools.PowerPlatform-BuildTools.set-connection-variables.PowerPlatformSetConnectionVariables@2
                    displayName: 'Set Connection Variables'
                    name: PowerPlatformSetConnectionVariables
                    inputs:
                      authenticationType: 'PowerPlatformSPN'
                      PowerPlatformSPN: '${{ parameters.environmentName }}'
                
                - pwsh: |
                    & "$(Pipeline.Workspace)/build/artifacts/alm/pipelines/scripts/installdependencies.ps1"
                    $environmentUrl = '$(ALM4DataverseSetConnectionVariables.EnvironmentUrl)'
                    if ([string]::IsNullOrWhiteSpace($environmentUrl) -or $environmentUrl -match '^\$\(.+\)$') {
                      $environmentUrl = '$(BuildTools.EnvironmentUrl)'
                    }
                    if ([string]::IsNullOrWhiteSpace($environmentUrl) -or $environmentUrl -match '^\$\(.+\)$') {
                      throw "Environment URL could not be resolved from the selected connection variables task. Ensure the Power Platform service connection is configured correctly."
                    }

                    $useAlm4DataverseExtension = '${{ parameters.useAlm4DataverseExtension }}' -eq 'true'
                    if (-not $useAlm4DataverseExtension) {
                      function Resolve-ConnectionVariable {
                        param([string[]]$Candidates)

                        foreach ($candidate in $Candidates) {
                          if (-not [string]::IsNullOrWhiteSpace($candidate) -and $candidate -notmatch '^\$\(.+\)$') {
                            return $candidate
                          }
                        }

                        return $null
                      }

                      $resolvedClientId = Resolve-ConnectionVariable @(
                        $env:AZURE_CLIENT_ID
                        '$(PowerPlatformSetConnectionVariables.BuildTools.ApplicationId)'
                        '$(BuildTools.ApplicationId)'
                      )
                      $resolvedTenantId = Resolve-ConnectionVariable @(
                        $env:AZURE_TENANT_ID
                        '$(PowerPlatformSetConnectionVariables.BuildTools.TenantId)'
                        '$(BuildTools.TenantId)'
                      )
                      $resolvedClientSecret = Resolve-ConnectionVariable @(
                        $env:AZURE_CLIENT_SECRET
                        '$(PowerPlatformSetConnectionVariables.BuildTools.ClientSecret)'
                        '$(BuildTools.ClientSecret)'
                      )

                      if ([string]::IsNullOrWhiteSpace($resolvedClientId) -or [string]::IsNullOrWhiteSpace($resolvedTenantId) -or [string]::IsNullOrWhiteSpace($resolvedClientSecret)) {
                        throw "Service principal credentials could not be resolved from Set Connection Variables task outputs. Verify the Power Platform service connection and task output variable names."
                      }

                      $env:AZURE_CLIENT_ID = $resolvedClientId
                      $env:AZURE_TENANT_ID = $resolvedTenantId
                      $env:AZURE_CLIENT_SECRET = $resolvedClientSecret
                    }

                    & "$(Pipeline.Workspace)/build/artifacts/alm/pipelines/scripts/connect.ps1" -Url $environmentUrl
                    
                    # Run the deployment script FROM THE ARTIFACTS
                    # This ensures the script version matches the solution version being deployed
                    & "$(Pipeline.Workspace)/build/artifacts/alm/pipelines/scripts/deploy.ps1" `
                      -ArtifactsPath "$(Pipeline.Workspace)/build/artifacts"
                  displayName: 'Connect and Run Deployment Script from Artifacts'
                  workingDirectory: '$(Pipeline.Workspace)/build/artifacts'
                  env:
                    ${{ if eq(parameters.useAlm4DataverseExtension, true) }}:
                      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
                    ${{ if ne(parameters.useAlm4DataverseExtension, true) }}:
                      AZURE_CLIENT_ID: $(PowerPlatformSetConnectionVariables.BuildTools.ApplicationId)
                      AZURE_TENANT_ID: $(PowerPlatformSetConnectionVariables.BuildTools.TenantId)
                      AZURE_CLIENT_SECRET: $(PowerPlatformSetConnectionVariables.BuildTools.ClientSecret)

                - pwsh: |
                    $ErrorActionPreference = 'Stop'

                    function ConvertTo-TagSegment {
                      param([Parameter(Mandatory)][string]$Value)

                      $sanitized = $Value `
                        -replace '[^a-zA-Z0-9._/-]', '-' `
                        -replace '\.{2,}', '-' `
                        -replace '/{2,}', '/'
                      $sanitized = $sanitized.Trim('/', '.')
                      if ($sanitized.EndsWith('.lock')) {
                        $sanitized = $sanitized -replace '\.lock$', '-lock'
                      }
                      if ([string]::IsNullOrWhiteSpace($sanitized)) {
                        throw "Value '$Value' cannot be converted to a valid git tag segment"
                      }

                      return $sanitized
                    }

                    $rawBuildRunName = '$(resources.pipeline.build.runName)'
                    $sanitizedBuildRunName = ConvertTo-TagSegment -Value $rawBuildRunName
                    $versionTag = "v$sanitizedBuildRunName"
                    $environmentTag = 'deployed/${{ parameters.environmentName }}'

                    Write-Host "Fetching build version tag '$versionTag' from origin"
                    git fetch --force origin "refs/tags/$versionTag:refs/tags/$versionTag"
                    if ($LASTEXITCODE -ne 0) {
                      throw "Failed to fetch build version tag '$versionTag' from origin"
                    }

                    $targetCommit = (git rev-list -n 1 "$versionTag").Trim()
                    if ([string]::IsNullOrWhiteSpace($targetCommit)) {
                      throw "Could not resolve a commit SHA from build version tag '$versionTag'"
                    }

                    Write-Host "Updating environment pointer tag '$environmentTag' to commit $targetCommit"
                    git tag -f "$environmentTag" "$targetCommit"
                    if ($LASTEXITCODE -ne 0) {
                      throw "Failed to create or move environment tag '$environmentTag'"
                    }

                    git push origin "refs/tags/$environmentTag" --force
                    if ($LASTEXITCODE -ne 0) {
                      throw "Failed to push environment tag '$environmentTag'"
                    }

                    Write-Host "Environment pointer tag '$environmentTag' now points to build '$versionTag' ($targetCommit)."
                  displayName: 'Update Environment Deployment Tag'
                  workingDirectory: '$(Build.SourcesDirectory)'
