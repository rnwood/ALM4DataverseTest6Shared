parameters:
- name: commitMessage
  type: string
  displayName: 'Commit message for exported changes'
- name: useAlm4DataverseExtension
  type: boolean
  default: true

stages:
  - stage: Export
    displayName: 'Export'
    jobs:
      - job: ExportJob
        pool: 
          vmImage: windows-2022
        displayName: 'Export'
        timeoutInMinutes: 360  # maximum allowed on Microsoft-hosted agents (free and paid)
        steps:
        - checkout: self
          persistCredentials: true
          fetchDepth: 1
          displayName: 'Checkout Source Code'
          path: self
          
        - checkout: ALM4Dataverse
          fetchDepth: 1
          displayName: 'Checkout ALM Templates Repository'
          path: alm

        - task: PowerPlatformToolInstaller@2
          displayName: 'Install Power Platform Tools'
          inputs:
            AddToolsToPath: true

        - ${{ if eq(parameters.useAlm4DataverseExtension, true) }}:
          - task: ALM4Dataverse.alm4dataverse-azdo-extensions.alm4dataverse-set-connection-variables.ALM4DataverseSetConnectionVariables@1
            displayName: 'Set Connection Variables'
            name: ALM4DataverseSetConnectionVariables
            inputs:
              authenticationType: 'PowerPlatformSPN'
              PowerPlatformSPN: Dev-${{ variables['Build.SourceBranchName'] }}

        - ${{ if ne(parameters.useAlm4DataverseExtension, true) }}:
          - task: microsoft-IsvExpTools.PowerPlatform-BuildTools.set-connection-variables.PowerPlatformSetConnectionVariables@2
            displayName: 'Set Connection Variables'
            name: PowerPlatformSetConnectionVariables
            inputs:
              authenticationType: 'PowerPlatformSPN'
              PowerPlatformSPN: Dev-${{ variables['Build.SourceBranchName'] }}

        - pwsh: |
              & "$(Pipeline.Workspace)/alm/pipelines/scripts/installdependencies.ps1"
              $environmentUrl = '$(ALM4DataverseSetConnectionVariables.EnvironmentUrl)'
              if ([string]::IsNullOrWhiteSpace($environmentUrl) -or $environmentUrl -match '^\$\(.+\)$') {
                $environmentUrl = '$(BuildTools.EnvironmentUrl)'
              }
              if ([string]::IsNullOrWhiteSpace($environmentUrl) -or $environmentUrl -match '^\$\(.+\)$') {
                throw "Environment URL could not be resolved from the selected connection variables task. Ensure the Power Platform service connection is configured correctly."
              }
              & "$(Pipeline.Workspace)/alm/pipelines/scripts/connect.ps1" -Url $environmentUrl
              & "$(Pipeline.Workspace)/alm/pipelines/scripts/export.ps1" `
                -SourceDirectory "$(Pipeline.Workspace)/self" `
                -ArtifactStagingDirectory "$(Build.ArtifactStagingDirectory)" `
                -TempDirectory "$(Agent.TempDirectory)" `
                -EnvironmentName "Dev-${{ variables['Build.SourceBranchName'] }}"
          displayName: 'Connect and Export Solutions'
          workingDirectory: '$(Pipeline.Workspace)/self'
          env:
            ${{ if eq(parameters.useAlm4DataverseExtension, true) }}:
              AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
            ${{ if ne(parameters.useAlm4DataverseExtension, true) }}:
              AZURE_CLIENT_ID: $(BuildTools.ApplicationId)
              AZURE_TENANT_ID: $(BuildTools.TenantId)
              AZURE_CLIENT_SECRET: $(BuildTools.ClientSecret)

        - pwsh: |
            $ErrorActionPreference = 'Stop'
            git config user.email "$(Build.RequestedForEmail)"
            if ($LASTEXITCODE -ne 0) { throw "git config user.email failed with exit code $LASTEXITCODE" }
            git config user.name "$(Build.RequestedFor)"
            if ($LASTEXITCODE -ne 0) { throw "git config user.name failed with exit code $LASTEXITCODE" }
            git add .
            if ($LASTEXITCODE -ne 0) { throw "git add failed with exit code $LASTEXITCODE" }
            git commit -m "${{ parameters.commitMessage }}"
            if ($LASTEXITCODE -eq 0) {
                # Committed successfully
            } elseif ($LASTEXITCODE -eq 1) {
                Write-Host "No changes to commit"
            } else {
                throw "git commit failed with exit code $LASTEXITCODE"
            }
            git push origin HEAD:$(Build.SourceBranch)
            if ($LASTEXITCODE -ne 0) { throw "git push failed with exit code $LASTEXITCODE" }
          displayName: 'Commit Changes'
          workingDirectory: '$(Pipeline.Workspace)/self'
